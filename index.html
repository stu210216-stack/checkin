<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>強力掃描器</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; background: #000; color: white; text-align: center; font-family: sans-serif; overflow: hidden; }
        #video { width: 100vw; height: 100vh; object-fit: cover; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; border: 2px solid #00ff00; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); pointer-events: none; }
        #status { position: absolute; bottom: 10%; width: 100%; font-size: 1.2rem; background: rgba(0,0,0,0.7); padding: 10px 0; }
    </style>
</head>
<body>
    <video id="video" playsinline></video>
    <div class="overlay"></div>
    <div id="status">請將 QR Code 放入方框中</div>

    <script>
        const GAS_URL = "你的_GAS_部署網址"; 
        const video = document.getElementById("video");
        const status = document.getElementById("status");
        let isProcessing = false;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", focusMode: "continuous" } })
        .then(stream => { video.srcObject = stream; video.play(); requestAnimationFrame(tick); })
        .catch(() => { status.innerText = "請使用 HTTPS 並開啟相機權限"; });

        function tick() {
            if (isProcessing) return;
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement("canvas");
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

                if (code) {
                    isProcessing = true;
                    if (navigator.vibrate) navigator.vibrate(200); // 掃描成功震動
                    sendData(code.data);
                    return;
                }
            }
            requestAnimationFrame(tick);
        }

        function sendData(qrData) {
            status.innerHTML = "傳送中...";
            const img = new Image();
            img.src = GAS_URL + "?data=" + encodeURIComponent(qrData);
            img.onload = img.onerror = () => {
                status.innerHTML = `<span style="color:#00ff00">簽到完成！</span><br>${qrData}`;
                setTimeout(() => { isProcessing = false; status.innerText = "請將 QR Code 放入方框中"; requestAnimationFrame(tick); }, 3000);
            };
        }
    </script>
</body>
</html>
